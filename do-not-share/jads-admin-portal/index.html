<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="JADS Government Admin Portal" />
    <title>JADS Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
             background: #050A08; color: #b0c8b8; }
      #root { min-height: 100vh; position: relative; }
      #root::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        background: repeating-linear-gradient(
          0deg, transparent, transparent 2px,
          rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px
        );
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0A120E; }
      ::-webkit-scrollbar-thumb { background: #1A3020; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #2A4030; }
      input, select, button, textarea {
        font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
