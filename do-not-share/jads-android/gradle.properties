# Project-wide Gradle settings

# Increase Gradle JVM heap — Room KSP + Bouncy Castle add to compile-time memory.
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

# Use Gradle build cache — speeds up clean builds after minor changes.
org.gradle.caching=true

# Enable parallel builds (safe for single-module projects)
org.gradle.parallel=true

# AndroidX: migrate all support libraries automatically
android.useAndroidX=true

# Kotlin: suppress version check warnings for stdlib
kotlin.stdlib.default.dependency=false
