---
name: JADS Platform — Full Pipeline
"on":
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

# Shared env — all jobs inherit
env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:

  # ===========================================================
  # STAGE 0 — Environment gate
  # ===========================================================

  env-check:
    name: Environment Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Node.js >= 20
        run: >-
          node --version |
          grep -E 'v2[0-9]\.' ||
          (echo 'Node < 20' && exit 1)

      - name: Verify Java >= 17
        run: >-
          java -version 2>&1 |
          grep -E 'version "(1[7-9]|[2-9][0-9])' ||
          (echo 'Java < 17 required' && exit 1)

      - name: Verify Docker available
        run: docker info

      - name: Verify Gradle wrapper
        run: >-
          cd do-not-share/jads-android &&
          ./gradlew --version

  # ===========================================================
  # STAGE 1 — Security scanning
  # ===========================================================

  secret-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: npm audit — backend
        run: >-
          cd do-not-share/jads-backend &&
          npm ci && npm audit --audit-level=high
      - name: npm audit — admin portal
        run: >-
          cd do-not-share/jads-admin-portal &&
          npm ci && npm audit --audit-level=high
      - name: npm audit — audit portal
        run: >-
          cd do-not-share/jads-audit-portal &&
          npm ci && npm audit --audit-level=high

  sast-scan:
    name: SAST — CodeQL
    runs-on: ubuntu-latest
    needs: env-check
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # ===========================================================
  # STAGE 2 — Determinism gates (byte-perfect forensics)
  # ===========================================================

  canonical-determinism:
    name: Cross-Runtime Serializer Determinism
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: >-
            do-not-share/jads-backend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'

      - name: Build backend TypeScript
        run: >-
          cd do-not-share/jads-backend &&
          npm ci && npm run build

      - name: Kotlin serializer write hex
        run: |
          cd do-not-share/jads-android
          ./gradlew test \
            --tests '*.CanonicalSerializerTest.crossRuntimeVector' \
            --stacktrace \
            --info

      - name: TypeScript serializer diff must be 0 bytes
        run: |
          cd do-not-share/jads-backend
          node dist/telemetry/crossRuntimeTest.js \
            /tmp/kotlin_canonical.hex

      - name: Upload hex artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-hex-diff
          path: /tmp/*.hex

  ecdsa-determinism:
    name: ECDSA RFC 6979 Determinism
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'
      - name: sign() twice identical DER bytes
        run: |
          cd do-not-share/jads-android
          ./gradlew test \
            --tests '*.EcdsaSignerTest.signDeterminism' \
            --stacktrace \
            --info

  hash-chain-properties:
    name: >-
      Hash Chain Properties
      (${{ matrix.iterations }} iterations)
    runs-on: ubuntu-latest
    needs: env-check
    strategy:
      fail-fast: true
      matrix:
        iterations: [1000, 10000]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'
      - name: >-
          Hash chain property test
          (${{ matrix.iterations }} iterations)
        run: |
          cd do-not-share/jads-android
          KOTEST_ITERATIONS=${{ matrix.iterations }} \
            ./gradlew test \
              --tests '*.HashChainPropertyTest' \
              --stacktrace

  # ===========================================================
  # STAGE 3 — Android unit tests + APK build
  # ===========================================================

  npnt-gate-tests:
    name: NPNT Compliance Gate + Airport Proximity
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'
      - run: |
          cd do-not-share/jads-android
          ./gradlew test \
            --tests '*.NpntComplianceGateTest' \
            --stacktrace

  forensic-suite:
    name: >-
      Forensic Verifier
      (10-point verification, tamper detection)
    runs-on: ubuntu-latest
    needs: canonical-determinism
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'
      - run: |
          cd do-not-share/jads-android
          ./gradlew test \
            --tests '*.ForensicVerifierTest' \
            --stacktrace

  android-apk:
    name: Android APK Build (assembleDebug)
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'
      - name: Build debug APK
        run: >-
          cd do-not-share/jads-android &&
          ./gradlew assembleDebug --stacktrace
      - name: Verify APK exists
        run: |
          APK=do-not-share/jads-android/app/build
          APK=$APK/outputs/apk/debug/app-debug.apk
          test -f "$APK"
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jads-android-debug
          path: >-
            do-not-share/jads-android/app/build/outputs/apk/debug/app-debug.apk

  # ===========================================================
  # STAGE 3b — Backend unit tests (all run in parallel)
  # ===========================================================

  adapter-contracts:
    name: Adapter Contract Tests
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: >-
            do-not-share/jads-backend/package-lock.json
      - run: npm ci --prefix do-not-share/jads-backend
      - run: >-
          npm test -- adapterContracts
          --prefix do-not-share/jads-backend

  airspace-cms-tests:
    name: Airspace CMS + Two-Person Rule
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: >-
            do-not-share/jads-backend/package-lock.json
      - run: npm ci --prefix do-not-share/jads-backend
      - run: >-
          npm test -- airspaceCMS
          --prefix do-not-share/jads-backend
      - run: >-
          npm test -- airspaceCMS.twoPersonRule
          --prefix do-not-share/jads-backend

  auth-tests:
    name: Auth — Civilian OTP + Special Unit Password
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: >-
            do-not-share/jads-backend/package-lock.json
      - run: npm ci --prefix do-not-share/jads-backend
      - run: >-
          npm test -- civilianAuth specialUser
          --prefix do-not-share/jads-backend

  ofpl-validation-tests:
    name: OFPL Validation (RVSM, Semicircular, Route)
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: >-
            do-not-share/jads-backend/package-lock.json
      - run: npm ci --prefix do-not-share/jads-backend
      - run: >-
          npm test -- ofplValidation
          --prefix do-not-share/jads-backend

  telemetry-decoder:
    name: Telemetry Decoder (DEC-01-DEC-14)
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: >-
            do-not-share/jads-backend/package-lock.json
      - run: npm ci --prefix do-not-share/jads-backend
      - run: >-
          npm test -- telemetryDecoder
          --prefix do-not-share/jads-backend

  pqc-degradation:
    name: PQC Degradation Logging (ML-DSA-65 fallback)
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: >-
            do-not-share/jads-backend/package-lock.json
      - run: npm ci --prefix do-not-share/jads-backend
      - run: >-
          npm test -- pqc-degradation-logging
          --prefix do-not-share/jads-backend

  # ===========================================================
  # STAGE 4 — Schema + Migration validation (real Postgres)
  # ===========================================================

  schema-validation:
    name: Prisma Schema Syntax
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: >-
            do-not-share/jads-backend/package-lock.json
      - run: npm ci --prefix do-not-share/jads-backend
      - run: >-
          cd do-not-share/jads-backend &&
          npx prisma validate

  migration-check:
    name: Prisma Migration Integrity (real Postgres)
    runs-on: ubuntu-latest
    needs: env-check
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jads_test
          POSTGRES_PASSWORD: jads_test_pw
          POSTGRES_DB: jads_migration
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: >-
            do-not-share/jads-backend/package-lock.json
      - run: npm ci --prefix do-not-share/jads-backend
      - name: Apply migrations to clean DB
        env:
          DATABASE_URL: >-
            postgresql://jads_test:jads_test_pw@localhost:5432/jads_migration
        run: >-
          cd do-not-share/jads-backend &&
          npx prisma migrate deploy
      - name: Verify no schema drift
        env:
          DATABASE_URL: >-
            postgresql://jads_test:jads_test_pw@localhost:5432/jads_migration
        run: |
          cd do-not-share/jads-backend
          npx prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url \
            postgresql://jads_test:jads_test_pw@localhost:5432/jads_migration \
            --exit-code

  # ===========================================================
  # STAGE 5 — E2E integration tests
  # ===========================================================

  e2e-integration:
    name: E2E — ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs:
      - canonical-determinism
      - ecdsa-determinism
      - schema-validation
      - migration-check
      - auth-tests
    strategy:
      fail-fast: false
      matrix:
        suite:
          - manned
          - airspace
          - drone
          - audit
          - security

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jads_e2e
          POSTGRES_PASSWORD: jads_e2e_pw
          POSTGRES_DB: jads_e2e_${{ matrix.suite }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      # yamllint disable-line rule:line-length
      TEST_DATABASE_URL: postgresql://jads_e2e:jads_e2e_pw@localhost:5432/jads_e2e_${{ matrix.suite }}
      JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
      ADMIN_JWT_SECRET: ${{ secrets.TEST_ADMIN_JWT_SECRET }}
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: >-
            do-not-share/jads-backend/package-lock.json
      - run: npm ci --prefix do-not-share/jads-backend
      - name: Apply migrations
        run: >-
          cd do-not-share/jads-backend &&
          npx prisma migrate deploy
      - name: Run ${{ matrix.suite }} E2E suite
        run: |
          cd do-not-share/jads-backend
          npm test -- \
            --testPathPattern='e2e/${{ matrix.suite }}' \
            --forceExit \
            --detectOpenHandles
        timeout-minutes: 10
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.suite }}
          path: >-
            do-not-share/jads-backend/test-results/

  e2e-performance:
    name: Performance Tests (throughput + latency)
    runs-on: ubuntu-latest
    needs: e2e-integration
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jads_perf
          POSTGRES_PASSWORD: jads_perf_pw
          POSTGRES_DB: jads_perf
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      TEST_DATABASE_URL: >-
        postgresql://jads_perf:jads_perf_pw@localhost:5432/jads_perf
      JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
      ADMIN_JWT_SECRET: ${{ secrets.TEST_ADMIN_JWT_SECRET }}
      NODE_ENV: test
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: >-
            do-not-share/jads-backend/package-lock.json
      - run: npm ci --prefix do-not-share/jads-backend
      - run: >-
          cd do-not-share/jads-backend &&
          npx prisma migrate deploy
      - name: Performance tests
        run: |
          cd do-not-share/jads-backend
          npm test -- \
            --testPathPattern='e2e/perf' \
            --forceExit \
            --detectOpenHandles \
            --verbose
        timeout-minutes: 15

  # ===========================================================
  # STAGE 6 — Frontend builds
  # ===========================================================

  build-portals:
    name: Portal Build — ${{ matrix.portal }}
    runs-on: ubuntu-latest
    needs: env-check
    strategy:
      fail-fast: false
      matrix:
        portal:
          - jads-admin-portal
          - jads-audit-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: >-
            do-not-share/${{ matrix.portal }}/package-lock.json
      - run: >-
          cd do-not-share/${{ matrix.portal }} &&
          npm ci && npm run build

  lint-pipeline:
    name: YAML Lint
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint --quiet
      - run: >-
          yamllint
          do-not-share/ci/jads-platform-pipeline.yml

  # ===========================================================
  # FINAL BUILD GATE — every job must pass, no exceptions
  # ===========================================================

  build-gate:
    name: Build Gate — All Jobs Green
    runs-on: ubuntu-latest
    if: always()
    needs:
      - secret-scan
      - dependency-scan
      - sast-scan
      - canonical-determinism
      - ecdsa-determinism
      - hash-chain-properties
      - npnt-gate-tests
      - forensic-suite
      - android-apk
      - adapter-contracts
      - airspace-cms-tests
      - auth-tests
      - ofpl-validation-tests
      - telemetry-decoder
      - pqc-degradation
      - schema-validation
      - migration-check
      - e2e-integration
      - e2e-performance
      - build-portals
      - lint-pipeline
    steps:
      - name: Evaluate all job results
        run: |
          FAILED="${{ contains(needs.*.result, 'failure') }}"
          CANCELLED="${{ contains(needs.*.result, 'cancelled') }}"

          if [[ "$FAILED" == "true" ]]; then
            echo "One or more jobs FAILED."
            exit 1
          fi
          if [[ "$CANCELLED" == "true" ]]; then
            echo "One or more jobs were CANCELLED."
            exit 1
          fi

          echo "JADS Platform v4.0 — All jobs passed."
