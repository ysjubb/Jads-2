name: JADS Platform — Full Pipeline
on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

# ── Shared env — all jobs inherit ──────────────────────────────────────────────
env:
  NODE_VERSION:      '20'
  JAVA_VERSION:      '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 0 — Environment gate
# ═══════════════════════════════════════════════════════════════════════════════

  env-check:
    name: Environment Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Straight quotes — curly quotes broke shell regex (feedback-1 fix #1)
      - name: Verify Node.js >= 20
        run: node --version | grep -E 'v2[0-9]\.' || (echo 'Node < 20 — pipeline requires Node 20+' && exit 1)

      - name: Verify Java >= 17
        run: java -version 2>&1 | grep -E 'version "(1[7-9]|[2-9][0-9])' || (echo 'Java < 17 required' && exit 1)

      - name: Verify Docker available
        run: docker info

      - name: Verify Gradle wrapper
        run: cd jads-android && ./gradlew --version

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — Security scanning (runs early — no point building if leaking secrets)
# ═══════════════════════════════════════════════════════════════════════════════

  secret-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required for secret scanning
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: npm audit — backend
        run: cd jads-backend && npm ci && npm audit --audit-level=high
      - name: npm audit — admin portal
        run: cd jads-admin-portal && npm ci && npm audit --audit-level=high
      - name: npm audit — audit portal
        run: cd jads-audit-portal && npm ci && npm audit --audit-level=high

  sast-scan:
    name: SAST — CodeQL
    runs-on: ubuntu-latest
    needs: env-check
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — Determinism gates (HIGHEST PRIORITY — byte-perfect forensics)
# ═══════════════════════════════════════════════════════════════════════════════

  canonical-determinism:
    name: Cross-Runtime Serializer Determinism (TS ↔ Kotlin)
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: jads-backend/package-lock.json

      - uses: actions/setup-java@v4    # v4 (feedback-1 fix #2)
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'

      - name: Build backend TypeScript
        run: cd jads-backend && npm ci && npm run build

      - name: Kotlin serializer → write hex to /tmp
        # --stacktrace --info so failures show WHICH byte differs (feedback-1 fix #3)
        run: |
          cd jads-android
          ./gradlew test \
            --tests '*.CanonicalSerializerTest.crossRuntimeVector' \
            --stacktrace \
            --info

      - name: TypeScript serializer → diff must be 0 bytes
        run: |
          cd jads-backend
          node dist/telemetry/crossRuntimeTest.js /tmp/kotlin_canonical.hex

      - name: Upload hex artifacts on failure (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-hex-diff
          path: /tmp/*.hex

  ecdsa-determinism:
    name: ECDSA RFC 6979 Determinism (HMacDSAKCalculator)
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'
      - name: sign() twice → identical DER bytes
        run: |
          cd jads-android
          ./gradlew test \
            --tests '*.EcdsaSignerTest.signDeterminism' \
            --stacktrace \
            --info

  # Parallel matrix runs: fast check (1000) AND thorough check (10000) simultaneously
  # feedback-1 fix #5 — parallelization via matrix
  hash-chain-properties:
    name: Hash Chain Properties (${{ matrix.iterations }} iterations)
    runs-on: ubuntu-latest
    needs: env-check
    strategy:
      fail-fast: true
      matrix:
        iterations: [1000, 10000]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'
      - name: Hash chain property test (${{ matrix.iterations }} iterations)
        run: |
          cd jads-android
          KOTEST_ITERATIONS=${{ matrix.iterations }} \
            ./gradlew test \
              --tests '*.HashChainPropertyTest' \
              --stacktrace

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — Android unit tests
# ═══════════════════════════════════════════════════════════════════════════════

  npnt-gate-tests:
    name: NPNT Compliance Gate + Airport Proximity
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'
      - run: |
          cd jads-android
          ./gradlew test \
            --tests '*.NpntComplianceGateTest' \
            --stacktrace

  forensic-suite:
    name: Forensic Verifier (8 invariants, tamper detection)
    runs-on: ubuntu-latest
    needs: canonical-determinism    # Forensics require serializer to be correct first
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'
      - run: |
          cd jads-android
          ./gradlew test \
            --tests '*.ForensicVerifierTest' \
            --stacktrace

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 3b — Backend unit tests (all run in parallel)
# ═══════════════════════════════════════════════════════════════════════════════

  adapter-contracts:
    name: Adapter Contract Tests
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: jads-backend/package-lock.json
      - run: npm ci --prefix jads-backend
      - run: npm test -- adapterContracts --prefix jads-backend

  airspace-cms-tests:
    name: Airspace CMS + Two-Person Rule
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: jads-backend/package-lock.json
      - run: npm ci --prefix jads-backend
      # Both tests in one job — two-person rule is part of CMS, not separate
      - run: npm test -- airspaceCMS --prefix jads-backend
      - run: npm test -- airspaceCMS.twoPersonRule --prefix jads-backend

  auth-tests:
    name: Auth — Civilian OTP + Special Unit Password
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: jads-backend/package-lock.json
      - run: npm ci --prefix jads-backend
      - run: npm test -- civilianAuth specialUser --prefix jads-backend

  ofpl-validation-tests:
    name: OFPL Validation (RVSM, Semicircular Rule, Route)
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: jads-backend/package-lock.json
      - run: npm ci --prefix jads-backend
      - run: npm test -- ofplValidation --prefix jads-backend

  telemetry-decoder:
    name: Telemetry Decoder (DEC-01–DEC-14, TV-001/TV-002)
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: jads-backend/package-lock.json
      - run: npm ci --prefix jads-backend
      - run: npm test -- telemetryDecoder --prefix jads-backend

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 4 — Schema + Migration validation (real Postgres)
# feedback-2 new addition
# ═══════════════════════════════════════════════════════════════════════════════

  schema-validation:
    name: Prisma Schema Syntax
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: jads-backend/package-lock.json
      - run: npm ci --prefix jads-backend
      - run: cd jads-backend && npx prisma validate

  migration-check:
    name: Prisma Migration Integrity (real Postgres)
    runs-on: ubuntu-latest
    needs: env-check
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER:     jads_test
          POSTGRES_PASSWORD: jads_test_pw
          POSTGRES_DB:       jads_migration
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: jads-backend/package-lock.json
      - run: npm ci --prefix jads-backend
      - name: Apply migrations to clean DB
        env:
          DATABASE_URL: postgresql://jads_test:jads_test_pw@localhost:5432/jads_migration
        run: cd jads-backend && npx prisma migrate deploy
      - name: Verify no schema drift (schema.prisma matches migrations)
        env:
          DATABASE_URL: postgresql://jads_test:jads_test_pw@localhost:5432/jads_migration
        run: |
          cd jads-backend
          npx prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url postgresql://jads_test:jads_test_pw@localhost:5432/jads_migration \
            --exit-code

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 5 — E2E integration tests
# Isolated per suite (feedback-2 fix). Parallel matrix (feedback-1 fix).
# Credentials from secrets, never hardcoded (feedback-2 fix).
# No conditional skips — failures surface immediately (feedback-2 fix).
# ═══════════════════════════════════════════════════════════════════════════════

  e2e-integration:
    name: E2E — ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs:
      - canonical-determinism
      - ecdsa-determinism
      - schema-validation
      - migration-check
      - auth-tests
    strategy:
      fail-fast: false    # All suites run — see ALL failures not just first
      matrix:
        suite:
          - manned       # E2E-1  → E2E-5
          - airspace     # E2E-10 → E2E-14
          - drone        # E2E-15 → E2E-20
          - audit        # E2E-21 → E2E-27
          - security     # SCOPE-01 → SCOPE-11 (S2/S3 post-flight-only enforcement)

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER:     jads_e2e
          POSTGRES_PASSWORD: jads_e2e_pw
          POSTGRES_DB:       jads_e2e_${{ matrix.suite }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      # Secrets injected at runtime — never in source (feedback-2 fix)
      TEST_DATABASE_URL: postgresql://jads_e2e:jads_e2e_pw@localhost:5432/jads_e2e_${{ matrix.suite }}
      JWT_SECRET:        ${{ secrets.TEST_JWT_SECRET }}
      ADMIN_JWT_SECRET:  ${{ secrets.TEST_ADMIN_JWT_SECRET }}
      NODE_ENV:          test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: jads-backend/package-lock.json
      - run: npm ci --prefix jads-backend
      - name: Apply migrations to isolated test DB
        run: cd jads-backend && npx prisma migrate deploy
      - name: Run ${{ matrix.suite }} E2E suite
        run: |
          cd jads-backend
          npm test -- \
            --testPathPattern='e2e/${{ matrix.suite }}' \
            --forceExit \
            --detectOpenHandles
        timeout-minutes: 10
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.suite }}
          path: jads-backend/test-results/

  e2e-performance:
    name: Performance Tests (upload throughput + audit latency)
    runs-on: ubuntu-latest
    needs: e2e-integration    # Perf only runs if functional tests pass
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER:     jads_perf
          POSTGRES_PASSWORD: jads_perf_pw
          POSTGRES_DB:       jads_perf
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      TEST_DATABASE_URL: postgresql://jads_perf:jads_perf_pw@localhost:5432/jads_perf
      JWT_SECRET:        ${{ secrets.TEST_JWT_SECRET }}
      ADMIN_JWT_SECRET:  ${{ secrets.TEST_ADMIN_JWT_SECRET }}
      NODE_ENV:          test
      CI:                'true'    # Activates relaxed CI thresholds
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: jads-backend/package-lock.json
      - run: npm ci --prefix jads-backend
      - run: cd jads-backend && npx prisma migrate deploy
      - name: Performance tests
        run: |
          cd jads-backend
          npm test -- \
            --testPathPattern='e2e/perf' \
            --forceExit \
            --detectOpenHandles \
            --verbose
        timeout-minutes: 15

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 6 — Frontend builds
# ═══════════════════════════════════════════════════════════════════════════════

  build-portals:
    name: Portal Build — ${{ matrix.portal }}
    runs-on: ubuntu-latest
    needs: env-check
    strategy:
      fail-fast: false
      matrix:
        portal: [jads-admin-portal, jads-audit-portal]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.portal }}/package-lock.json
      - run: cd ${{ matrix.portal }} && npm ci && npm run build

  lint-pipeline:
    name: YAML Lint
    runs-on: ubuntu-latest
    needs: env-check
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint --quiet
      - run: yamllint .github/workflows/jads-platform-pipeline.yml

# ═══════════════════════════════════════════════════════════════════════════════
# FINAL BUILD GATE — every job must pass, no exceptions
# ═══════════════════════════════════════════════════════════════════════════════

  build-gate:
    name: Build Gate — All Jobs Green
    runs-on: ubuntu-latest
    if: always()
    needs:
      - secret-scan
      - dependency-scan
      - sast-scan
      - canonical-determinism
      - ecdsa-determinism
      - hash-chain-properties
      - npnt-gate-tests
      - forensic-suite
      - adapter-contracts
      - airspace-cms-tests
      - auth-tests
      - ofpl-validation-tests
      - telemetry-decoder
      - schema-validation
      - migration-check
      - e2e-integration
      - e2e-performance
      - build-portals
      - lint-pipeline
    steps:
      - name: Evaluate all job results
        run: |
          FAILED="${{ contains(needs.*.result, 'failure') }}"
          CANCELLED="${{ contains(needs.*.result, 'cancelled') }}"

          if [[ "$FAILED" == "true" ]]; then
            echo "❌ One or more jobs FAILED. Build is NOT green."
            exit 1
          fi
          if [[ "$CANCELLED" == "true" ]]; then
            echo "⚠️  One or more jobs were CANCELLED."
            exit 1
          fi

          echo "✅ JADS Platform v4.0 — All pipeline jobs passed. Build is green."
